services:
  db:
    image: postgres:16
    environment:
      # `player` is the OWNER/MIGRATION role (the official image makes it a superuser).
      # The API connects as the RLS-bound `app_runtime` role created by alembic — see
      # PG_APP_USER / PG_APP_PASSWORD in .env.example (audit C1).
      POSTGRES_USER: player
      POSTGRES_PASSWORD: player
      POSTGRES_DB: player
    # Host port 5433 avoids clashing with a locally installed PostgreSQL on 5432.
    ports: ['5433:5432']
    volumes: ['pgdata:/var/lib/postgresql/data']
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U player']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    ports: ['6379:6379']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ['9000:9000', '9001:9001']
    volumes: ['miniodata:/data']

  mailhog:
    image: mailhog/mailhog
    ports: ['1025:1025', '8025:8025']

volumes:
  pgdata:
  miniodata:
