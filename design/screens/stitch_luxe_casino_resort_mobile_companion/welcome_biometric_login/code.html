        :root {
            --glass-bg: rgba(26, 26, 28, 0.7);
            --glass-border: rgba(255, 255, 255, 0.15);
        }
        body {
            background-color: #050505;
            margin: 0;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }
        .glass-island {
            backdrop-filter: blur(40px) saturate(150%);
            -webkit-backdrop-filter: blur(40px) saturate(150%);
            background: var(--glass-bg);
            border-top: 0.5px solid var(--glass-border);
            border-left: 0.5px solid var(--glass-border);
        }
        .biometric-scan {
            animation: pulse-glow 3s infinite ease-in-out;
        }
        @keyframes pulse-glow {
            0%, 100% { opacity: 0.4; transform: scale(1); filter: drop-shadow(0 0 0px rgba(201, 198, 197, 0)); }
            50% { opacity: 1; transform: scale(1.05); filter: drop-shadow(0 0 15px rgba(201, 198, 197, 0.3)); }
        }
        .shimmer {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            background-size: 200% 100%;
            animation: shimmer-effect 4s infinite linear;
        }
        @keyframes shimmer-effect {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .fade-in {
            animation: fadeInScale 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        @keyframes fadeInScale {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>

</button>

</div>

<!-- Micro-interaction Scripts -->
<script>
        function handleAuth() {
            const btn = document.querySelector('button');
            const icon = document.querySelector('.biometric-scan');
            
            // Visual feedback
            btn.innerHTML = 'VERIFYING...';
            icon.style.animation = 'none';
            icon.classList.add('scale-90', 'opacity-50', 'transition-all', 'duration-500');
            
            // Simulate haptic & success
            setTimeout(() => {
                if (window.navigator.vibrate) window.navigator.vibrate(10);
                btn.innerHTML = 'ACCESS GRANTED';
                btn.classList.replace('bg-primary', 'bg-tertiary-container');
                btn.classList.add('text-tertiary');
                
                // Final reveal transition
                setTimeout(() => {
                    document.body.style.opacity = '0';
                    document.body.style.transition = 'opacity 1s ease-out';
                }, 800);
            }, 1500);
        }

        // Atmosphere Effect: Subtle Mouse Parallax
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 20;
            const y = (e.clientY / window.innerHeight - 0.5) * 20;
            document.querySelector('[style*="background-image"]').style.transform = `scale(1.1) translate(${x}px, ${y}px)`;
        });
    </script>
