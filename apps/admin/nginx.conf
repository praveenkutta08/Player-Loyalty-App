# Serve the admin SPA. Client-side routing (TanStack Router) → fall back to index.html.
# The app calls the backend directly at VITE_API_BASE_URL (baked at build), so no API proxy here.
server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Long-cache hashed assets; never cache the HTML shell.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
